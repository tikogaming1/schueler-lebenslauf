<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebenslauf Generator für Schüler</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc, query, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        
        // 🔥 HIER DEINE FIREBASE CONFIG EINFÜGEN (von Firebase Console)
        const firebaseConfig = {
            apiKey: "DEIN_API_KEY",
            authDomain: "DEIN_PROJECT_ID.firebaseapp.com",
            projectId: "DEIN_PROJECT_ID",
            storageBucket: "DEIN_PROJECT_ID.appspot.com",
            messagingSenderId: "DEINE_MESSAGING_ID",
            appId: "DEINE_APP_ID"
        };
        
        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.firebaseAuth = { createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged };
        window.firebaseFirestore = { collection, doc, setDoc, getDoc, getDocs, deleteDoc, query, where };
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
        }

        .input-panel {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .panel-header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .panel-header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .panel-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .tab {
            flex: 1;
            padding: 12px 8px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.3s;
            min-width: 80px;
        }

        .tab:hover {
            background: #e9ecef;
            color: #495057;
        }

        .tab.active {
            background: white;
            color: #11998e;
            border-bottom: 3px solid #11998e;
        }

        .tab-content {
            display: none;
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #495057;
            font-size: 0.9rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #11998e;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .entry-list {
            margin-top: 15px;
        }

        .entry-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #11998e;
        }

        .entry-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .entry-item-title {
            font-weight: 600;
            color: #495057;
        }

        .entry-item-subtitle {
            font-size: 0.85rem;
            color: #6c757d;
        }

        .preview-panel {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            min-height: 800px;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #11998e;
        }

        .preview-title {
            font-size: 1.8rem;
            color: #333;
        }

        .preview-actions {
            display: flex;
            gap: 10px;
        }

        .cv-container {
            font-family: 'Georgia', serif;
            color: #333;
            line-height: 1.6;
        }

        .cv-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #2c3e50;
        }

        .cv-name {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .cv-contact {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 0.95rem;
            color: #555;
        }

        .cv-contact-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .cv-section {
            margin-bottom: 25px;
        }

        .cv-section-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #11998e;
        }

        .cv-entry {
            margin-bottom: 20px;
        }

        .cv-entry-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 5px;
        }

        .cv-entry-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: #2c3e50;
        }

        .cv-entry-date {
            font-style: italic;
            color: #666;
            font-size: 0.9rem;
        }

        .cv-entry-subtitle {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        .cv-entry-description {
            color: #444;
            text-align: justify;
        }

        .cv-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .cv-skill {
            background: #e8f5f3;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid #11998e;
        }

        .add-entry-form {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .empty-state {
            text-align: center;
            color: #6c757d;
            padding: 40px;
            font-style: italic;
        }

        .auth-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .auth-modal.active {
            display: flex;
        }

        .auth-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .auth-box h2 {
            margin-bottom: 20px;
            color: #11998e;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 15px;
            color: #666;
        }

        .auth-toggle a {
            color: #11998e;
            cursor: pointer;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .saved-cvs {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .saved-cv-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: white;
            margin-bottom: 8px;
            border-radius: 5px;
            border-left: 3px solid #11998e;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .input-panel {
                display: none;
            }
            .container {
                grid-template-columns: 1fr;
            }
            .preview-panel {
                box-shadow: none;
                padding: 20px;
            }
            .preview-header {
                display: none;
            }
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
            .input-panel {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="input-panel">
            <div class="panel-header">
                <h1>🎓 Schüler Lebenslauf</h1>
                <p>Für Ausbildung, Praktikum & FSJ</p>
            </div>

            <!-- User Auth Section -->
            <div id="userInfo" style="padding: 15px; border-bottom: 1px solid #dee2e6;">
                <button class="btn btn-primary" onclick="openAuthModal()" style="width: 100%;">🔐 Anmelden / Registrieren</button>
            </div>

            <!-- Saved CVs Section -->
            <div id="savedCVs" class="saved-cvs" style="display: none;"></div>
            
            <div class="tabs">
                <button class="tab active" onclick="showTab('personal')">👤 Ich</button>
                <button class="tab" onclick="showTab('school')">🏫 Schule</button>
                <button class="tab" onclick="showTab('internship')">💼 Praktika</button>
                <button class="tab" onclick="showTab('engagement')">⭐ Engagement</button>
                <button class="tab" onclick="showTab('skills')">🎯 Fähigkeiten</button>
            </div>

            <!-- Persönliche Informationen -->
            <div id="personal" class="tab-content active">
                <div class="form-group">
                    <label>Vorname *</label>
                    <input type="text" id="firstName" placeholder="Max" onchange="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Nachname *</label>
                    <input type="text" id="lastName" placeholder="Mustermann" onchange="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Geburtsdatum & -ort</label>
                    <input type="text" id="birthInfo" placeholder="z.B. 15.03.2006 in Berlin" onchange="updatePreview()">
                </div>
                <div class="form-group">
                    <label>E-Mail *</label>
                    <input type="email" id="email" placeholder="max.mustermann@email.de" onchange="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Telefon</label>
                    <input type="tel" id="phone" placeholder="+49 123 456789" onchange="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Adresse *</label>
                    <input type="text" id="address" placeholder="Musterstraße 1, 12345 Musterstadt" onchange="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Über mich (kurzer Text über dich)</label>
                    <textarea id="aboutMe" placeholder="Ich bin ein engagierter Schüler, der gerne..." onchange="updatePreview()"></textarea>
                </div>
            </div>

            <!-- Schulbildung -->
            <div id="school" class="tab-content">
                <div class="add-entry-form">
                    <div class="form-group">
                        <label>Schulname</label>
                        <input type="text" id="schoolName" placeholder="z.B. Gymnasium Musterstadt">
                    </div>
                    <div class="form-group">
                        <label>Schulart / Abschluss</label>
                        <select id="schoolType">
                            <option value="Grundschule">Grundschule</option>
                            <option value="Hauptschule">Hauptschule</option>
                            <option value="Realschule">Realschule</option>
                            <option value="Gymnasium">Gymnasium</option>
                            <option value="Gesamtschule">Gesamtschule</option>
                            <option value="Hauptschulabschluss">Hauptschulabschluss</option>
                            <option value="Realschulabschluss (Mittlere Reife)">Realschulabschluss</option>
                            <option value="Fachhochschulreife">Fachhochschulreife</option>
                            <option value="Abitur (Allgemeine Hochschulreife)">Abitur</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Von (Jahr)</label>
                            <input type="text" id="schoolFrom" placeholder="2015">
                        </div>
                        <div class="form-group">
                            <label>Bis (Jahr)</label>
                            <input type="text" id="schoolTo" placeholder="2024 oder 'heute'">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Besonderes (Schwerpunkt, Notendurchschnitt, etc.)</label>
                        <textarea id="schoolDetails" placeholder="z.B. Schwerpunkt Naturwissenschaften, Notendurchschnitt 2.3..."></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="addSchool()">➕ Schule hinzufügen</button>
                </div>
                <div id="schoolList" class="entry-list"></div>
            </div>

            <!-- Praktika -->
            <div id="internship" class="tab-content">
                <div class="add-entry-form">
                    <div class="form-group">
                        <label>Betrieb/Firma</label>
                        <input type="text" id="intCompany" placeholder="z.B. Musterfirma GmbH">
                    </div>
                    <div class="form-group">
                        <label>Bereich / Tätigkeit</label>
                        <input type="text" id="intPosition" placeholder="z.B. Betriebspraktikum im Verkauf">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Von</label>
                            <input type="text" id="intFrom" placeholder="MM/YYYY">
                        </div>
                        <div class="form-group">
                            <label>Bis</label>
                            <input type="text" id="intTo" placeholder="MM/YYYY">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Aufgaben & Erlebnisse</label>
                        <textarea id="intDescription" placeholder="Was hast du gemacht? Was hast du gelernt?"></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="addInternship()">➕ Praktikum hinzufügen</button>
                </div>
                <div id="internshipList" class="entry-list"></div>
            </div>

            <!-- Hobbys & Engagement -->
            <div id="engagement" class="tab-content">
                <div class="add-entry-form">
                    <div class="form-group">
                        <label>Was machst du?</label>
                        <input type="text" id="engActivity" placeholder="z.B. Fußball, Schülervertretung, Ehrenamt...">
                    </div>
                    <div class="form-group">
                        <label>Wo? (Verein, Schule, etc.)</label>
                        <input type="text" id="engOrg" placeholder="z.B. SV Musterstadt, Schülervertretung...">
                    </div>
                    <div class="form-group">
                        <label>Seit wann?</label>
                        <input type="text" id="engSince" placeholder="z.B. 2019">
                    </div>
                    <div class="form-group">
                        <label>Beschreibung</label>
                        <textarea id="engDesc" placeholder="Was machst du dort? Welche Verantwortung hast du?"></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="addEngagement()">➕ Aktivität hinzufügen</button>
                </div>
                <div id="engagementList" class="entry-list"></div>
            </div>

            <!-- Fähigkeiten -->
            <div id="skills" class="tab-content">
                <div class="add-entry-form">
                    <div class="form-group">
                        <label>Computerkentnisse</label>
                        <input type="text" id="skillIT" placeholder="z.B. Word, Excel, PowerPoint, Programmieren..." onchange="updatePreview()">
                    </div>
                    <div class="form-group">
                        <label>Fremdsprachen</label>
                        <input type="text" id="skillLang" placeholder="z.B. Englisch (gut), Französisch (Grundkenntnisse)..." onchange="updatePreview()">
                    </div>
                    <div class="form-group">
                        <label>Stärken & Fähigkeiten</label>
                        <input type="text" id="skillStrength" placeholder="z.B. Teamfähig, kommunikativ, organisiert..." onchange="updatePreview()">
                    </div>
                    <div class="form-group">
                        <label>Führerschein (falls vorhanden)</label>
                        <input type="text" id="skillLicense" placeholder="z.B. Klasse B (erworben 2024)" onchange="updatePreview()">
                    </div>
                    <div class="form-group">
                        <label>Interessen & Hobbys (kurz)</label>
                        <input type="text" id="skillHobbies" placeholder="z.B. Sport, Musik lesen, Fotografie..." onchange="updatePreview()">
                    </div>
                </div>
            </div>
        </div>

        <div class="preview-panel">
            <div class="preview-header">
                <h2 class="preview-title">📋 Dein Lebenslauf</h2>
                <div class="preview-actions">
                    <button class="btn btn-success" onclick="openSaveModal()">💾 Speichern</button>
                    <button class="btn btn-success" onclick="exportToWord()">📄 Word</button>
                    <button class="btn btn-success" onclick="window.print()">🖨️ Drucken</button>
                    <button class="btn btn-secondary" onclick="loadExample()">📄 Beispiel</button>
                    <button class="btn btn-danger" onclick="clearAll()">🗑️ Löschen</button>
                </div>
            </div>
            
            <div id="cvPreview" class="cv-container">
                <div class="empty-state">
                    <h3>Willkommen! 🎓</h3>
                    <p>Fülle die Felder auf der linken Seite aus, um deinen Lebenslauf zu erstellen.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cvData = {
            personal: {},
            school: [],
            internship: [],
            engagement: [],
            skills: {}
        };

        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function updatePreview() {
            cvData.personal = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                birthInfo: document.getElementById('birthInfo').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                aboutMe: document.getElementById('aboutMe').value
            };
            cvData.skills = {
                it: document.getElementById('skillIT').value,
                languages: document.getElementById('skillLang').value,
                strengths: document.getElementById('skillStrength').value,
                license: document.getElementById('skillLicense').value,
                hobbies: document.getElementById('skillHobbies').value
            };
            renderCV();
        }

        function addSchool() {
            const entry = {
                name: document.getElementById('schoolName').value,
                type: document.getElementById('schoolType').value,
                from: document.getElementById('schoolFrom').value,
                to: document.getElementById('schoolTo').value,
                details: document.getElementById('schoolDetails').value
            };
            if (entry.name) {
                cvData.school.push(entry);
                document.getElementById('schoolName').value = '';
                document.getElementById('schoolFrom').value = '';
                document.getElementById('schoolTo').value = '';
                document.getElementById('schoolDetails').value = '';
                renderSchoolList();
                renderCV();
            }
        }

        function addInternship() {
            const entry = {
                company: document.getElementById('intCompany').value,
                position: document.getElementById('intPosition').value,
                from: document.getElementById('intFrom').value,
                to: document.getElementById('intTo').value,
                description: document.getElementById('intDescription').value
            };
            if (entry.company) {
                cvData.internship.push(entry);
                document.getElementById('intCompany').value = '';
                document.getElementById('intPosition').value = '';
                document.getElementById('intFrom').value = '';
                document.getElementById('intTo').value = '';
                document.getElementById('intDescription').value = '';
                renderInternshipList();
                renderCV();
            }
        }

        function addEngagement() {
            const entry = {
                activity: document.getElementById('engActivity').value,
                org: document.getElementById('engOrg').value,
                since: document.getElementById('engSince').value,
                desc: document.getElementById('engDesc').value
            };
            if (entry.activity) {
                cvData.engagement.push(entry);
                document.getElementById('engActivity').value = '';
                document.getElementById('engOrg').value = '';
                document.getElementById('engSince').value = '';
                document.getElementById('engDesc').value = '';
                renderEngagementList();
                renderCV();
            }
        }

        function renderSchoolList() {
            const container = document.getElementById('schoolList');
            container.innerHTML = cvData.school.map((school, index) => `
                <div class="entry-item">
                    <div class="entry-item-header">
                        <span class="entry-item-title">${school.name}</span>
                        <button class="btn btn-danger" onclick="removeSchool(${index})">🗑️</button>
                    </div>
                    <div class="entry-item-subtitle">${school.type} | ${school.from} - ${school.to}</div>
                </div>
            `).join('');
        }

        function renderInternshipList() {
            const container = document.getElementById('internshipList');
            container.innerHTML = cvData.internship.map((int, index) => `
                <div class="entry-item">
                    <div class="entry-item-header">
                        <span class="entry-item-title">${int.company}</span>
                        <button class="btn btn-danger" onclick="removeInternship(${index})">🗑️</button>
                    </div>
                    <div class="entry-item-subtitle">${int.position} | ${int.from} - ${int.to}</div>
                </div>
            `).join('');
        }

        function renderEngagementList() {
            const container = document.getElementById('engagementList');
            container.innerHTML = cvData.engagement.map((eng, index) => `
                <div class="entry-item">
                    <div class="entry-item-header">

        // Auth Functions
        let currentUser = null;
        let isLoginMode = true;

        function openAuthModal() {
            document.getElementById('authModal').classList.add('active');
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('active');
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').textContent = isLoginMode ? '🔐 Anmelden' : '📝 Registrieren';
            document.getElementById('authBtn').textContent = isLoginMode ? 'Anmelden' : 'Registrieren';
            document.getElementById('authToggleText').innerHTML = isLoginMode 
                ? 'Noch kein Konto? <a onclick="toggleAuthMode()">Registrieren</a>'
                : 'Bereits Konto? <a onclick="toggleAuthMode()">Anmelden</a>';
        }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            
            if (!email || !password || password.length < 6) {
                alert('Bitte gültige E-Mail und Passwort (mindestens 6 Zeichen) eingeben!');
                return;
            }

            try {
                if (isLoginMode) {
                    await window.firebaseAuth.signInWithEmailAndPassword(window.auth, email, password);
                    alert('Erfolgreich angemeldet!');
                } else {
                    await window.firebaseAuth.createUserWithEmailAndPassword(window.auth, email, password);
                    alert('Konto erfolgreich erstellt!');
                }
                closeAuthModal();
                updateAuthUI();
            } catch (error) {
                alert('Fehler: ' + error.message);
            }
        }

        async function logout() {
            await window.firebaseAuth.signOut(window.auth);
            currentUser = null;
            updateAuthUI();
            alert('Abgemeldet!');
        }

        function updateAuthUI() {
            const userInfo = document.getElementById('userInfo');
            const savedCVs = document.getElementById('savedCVs');
            if (currentUser) {
                userInfo.innerHTML = `
                    <div class="user-info">
                        <span>👤 ${currentUser.email}</span>
                        <button class="btn btn-secondary" onclick="logout()">Abmelden</button>
                    </div>
                `;
                savedCVs.style.display = 'block';
                loadSavedCVs();
            } else {
                userInfo.innerHTML = `
                    <button class="btn btn-primary" onclick="openAuthModal()" style="width: 100%;">🔐 Anmelden / Registrieren</button>
                `;
                savedCVs.style.display = 'none';
                savedCVs.innerHTML = '';
            }
        }

        function openSaveModal() {
            if (!currentUser) {
                alert('Bitte zuerst anmelden, um Lebensläufe zu speichern!');
                openAuthModal();
                return;
            }
            document.getElementById('saveModal').classList.add('active');
        }

        function closeSaveModal() {
            document.getElementById('saveModal').classList.remove('active');
        }

        async function saveCVToCloud() {
            const name = document.getElementById('cvName').value || 'Mein Lebenslauf';
            
            try {
                const cvRef = window.firebaseFirestore.doc(window.db, 'users', currentUser.uid, 'cvs', Date.now().toString());
                await window.firebaseFirestore.setDoc(cvRef, {
                    name: name,
                    data: cvData,
                    createdAt: new Date().toISOString()
                });
                alert('Lebenslauf gespeichert!');
                closeSaveModal();
                loadSavedCVs();
            } catch (error) {
                alert('Fehler beim Speichern: ' + error.message);
            }
        }

        async function loadSavedCVs() {
            if (!currentUser) return;
            
            try {
                const q = window.firebaseFirestore.query(
                    window.firebaseFirestore.collection(window.db, 'users', currentUser.uid, 'cvs')
                );
                const snapshot = await window.firebaseFirestore.getDocs(q);
                
                let html = '<h3>📂 Gespeicherte Lebensläufe</h3>';
                if (snapshot.empty) {
                    html += '<p style="color: #666; font-size: 0.9rem;">Noch keine Lebensläufe gespeichert.</p>';
                } else {
                    snapshot.forEach(doc => {
                        const cv = doc.data();
                        html += `
                            <div class="saved-cv-item">
                                <span>${cv.name}</span>
                                <div>
                                    <button class="btn btn-primary" style="padding: 5px 10px; font-size: 0.8rem;" onclick="loadCVFromCloud('${doc.id}')">Laden</button>
                                    <button class="btn btn-danger" style="padding: 5px 10px; font-size: 0.8rem;" onclick="deleteCVFromCloud('${doc.id}')">🗑️</button>
                                </div>
                            </div>
                        `;
                    });
                }
                document.getElementById('savedCVs').innerHTML = html;
            } catch (error) {
                console.error('Error loading CVs:', error);
            }
        }

        async function loadCVFromCloud(cvId) {
            try {
                const docRef = window.firebaseFirestore.doc(window.db, 'users', currentUser.uid, 'cvs', cvId);
                const docSnap = await window.firebaseFirestore.getDoc(docRef);
                
                if (docSnap.exists()) {
                    cvData = docSnap.data().data;
                    
                    // Update UI
                    document.getElementById('firstName').value = cvData.personal.firstName || '';
                    document.getElementById('lastName').value = cvData.personal.lastName || '';
                    document.getElementById('birthInfo').value = cvData.personal.birthInfo || '';
                    document.getElementById('email').value = cvData.personal.email || '';
                    document.getElementById('phone').value = cvData.personal.phone || '';
                    document.getElementById('address').value = cvData.personal.address || '';
                    document.getElementById('aboutMe').value = cvData.personal.aboutMe || '';
                    document.getElementById('skillIT').value = cvData.skills.it || '';
                    document.getElementById('skillLang').value = cvData.skills.languages || '';
                    document.getElementById('skillStrength').value = cvData.skills.strengths || '';
                    document.getElementById('skillLicense').value = cvData.skills.license || '';
                    document.getElementById('skillHobbies').value = cvData.skills.hobbies || '';
                    
                    renderSchoolList();
                    renderInternshipList();
                    renderEngagementList();
                    renderCV();
                    alert('Lebenslauf geladen!');
                }
            } catch (error) {
                alert('Fehler beim Laden: ' + error.message);
            }
        }

        async function deleteCVFromCloud(cvId) {
            if (!confirm('Möchtest du diesen Lebenslauf wirklich löschen?')) return;
            
            try {
                await window.firebaseFirestore.deleteDoc(
                    window.firebaseFirestore.doc(window.db, 'users', currentUser.uid, 'cvs', cvId)
                );
                loadSavedCVs();
            } catch (error) {
                alert('Fehler beim Löschen: ' + error.message);
            }
        }

        // Listen for auth state changes
        window.firebaseAuth.onAuthStateChanged(window.auth, (user) => {
            currentUser = user;
            updateAuthUI();
        });
    </script>

    </div>

    <!-- Save CV Modal -->
    <div id="saveModal" class="auth-modal">
        <div class="auth-box">
            <h2>💾 Lebenslauf speichern</h2>
            <div class="form-group">
                <label>Name für diesen Lebenslauf</label>
                <input type="text" id="cvName" placeholder="z.B. Bewerbung Ausbildung 2024">
            </div>
            <button class="btn btn-primary" onclick="saveCVToCloud()" style="width: 100%;">Speichern</button>
            <button class="btn btn-secondary" onclick="closeSaveModal()" style="width: 100%; margin-top: 10px;">Abbrechen</button>
        </div>
    </div>
</body>
</html>
